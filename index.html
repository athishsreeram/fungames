<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎮 Toddler Game World!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #74d7f7;
      --sun: #FFD93D;
      --grass: #6BCB77;
      --pink: #FF6B9D;
      --purple: #C77DFF;
      --orange: #FF9A3C;
      --white: #FFFDF0;
      --dark: #2D2D2D;
    }

    body {
      font-family: 'Fredoka One', cursive;
      background: linear-gradient(180deg, #74d7f7 0%, #a8edff 40%, #d4f5d4 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating clouds */
    .cloud {
      position: fixed;
      background: white;
      border-radius: 50px;
      opacity: 0.85;
      animation: floatCloud linear infinite;
      z-index: 0;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud-1 { width: 120px; height: 40px; top: 8%; animation-duration: 25s; animation-delay: 0s; }
    .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
    .cloud-1::after { width: 45px; height: 45px; top: -20px; left: 55px; }

    .cloud-2 { width: 90px; height: 30px; top: 18%; animation-duration: 35s; animation-delay: -10s; }
    .cloud-2::before { width: 45px; height: 45px; top: -22px; left: 15px; }
    .cloud-2::after { width: 35px; height: 35px; top: -15px; left: 42px; }

    .cloud-3 { width: 150px; height: 50px; top: 5%; animation-duration: 45s; animation-delay: -20s; }
    .cloud-3::before { width: 70px; height: 70px; top: -35px; left: 25px; }
    .cloud-3::after { width: 55px; height: 55px; top: -28px; left: 75px; }

    @keyframes floatCloud {
      from { transform: translateX(-250px); }
      to { transform: translateX(110vw); }
    }

    /* Stars */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      font-size: 1.5rem;
      animation: twinkle 2s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.3; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.2); }
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 10;
      max-width: 700px;
      margin: 0 auto;
      padding: 30px 20px 60px;
      text-align: center;
    }

    .title-wrap {
      margin-bottom: 10px;
      animation: bounceIn 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3) rotate(-5deg); opacity: 0; }
      50% { transform: scale(1.08) rotate(2deg); }
      70% { transform: scale(0.95) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .title-emoji {
      font-size: clamp(3rem, 10vw, 5rem);
      display: block;
      margin-bottom: -10px;
      animation: wiggle 2s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 4rem);
      color: #fff;
      text-shadow:
        4px 4px 0px #FF6B9D,
        -2px -2px 0px #C77DFF;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .subtitle {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(1rem, 4vw, 1.3rem);
      color: #5a4a8a;
      background: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 30px;
      margin-top: 12px;
    }

    /* Game cards grid */
    .games-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin-top: 35px;
    }

    @media (min-width: 480px) {
      .games-grid { grid-template-columns: 1fr 1fr; }
    }

    .game-card {
      background: var(--white);
      border-radius: 28px;
      padding: 28px 20px 24px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow:
        0 8px 0px rgba(0,0,0,0.12),
        0 0 0 4px rgba(255,255,255,0.6);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      border-radius: 28px 28px 0 0;
    }

    .card-ttt::before { background: linear-gradient(90deg, #FF6B9D, #FF9A3C); }

    .game-card:active {
      transform: translateY(4px) scale(0.97);
      box-shadow: 0 3px 0px rgba(0,0,0,0.12), 0 0 0 4px rgba(255,255,255,0.6);
    }

    @media (hover: hover) {
      .game-card:hover {
        transform: translateY(-6px) scale(1.03);
        box-shadow:
          0 14px 0px rgba(0,0,0,0.12),
          0 0 0 4px rgba(255,255,255,0.8);
      }
    }

    .card-icon {
      font-size: clamp(3.5rem, 12vw, 5rem);
      line-height: 1;
      filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.15));
      animation: iconFloat 3s ease-in-out infinite;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .card-name {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      color: var(--dark);
      text-align: center;
      line-height: 1.2;
    }

    .card-desc {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: clamp(0.85rem, 3vw, 1rem);
      color: #888;
      text-align: center;
    }

    .card-badge {
      background: linear-gradient(135deg, #FF6B9D, #FF9A3C);
      color: white;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    /* Coming soon cards */
    .card-soon {
      opacity: 0.65;
      cursor: default;
    }
    .card-soon::after {
      content: 'SOON! 🔜';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      font-size: 1.8rem;
      color: #aaa;
      background: rgba(255,255,255,0.85);
      padding: 8px 16px;
      border-radius: 12px;
      border: 3px dashed #ccc;
      white-space: nowrap;
    }
    .card-soon:hover { transform: none; }

    /* Bottom grass */
    .grass-row {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 55px;
      z-index: 1;
      pointer-events: none;
    }
    .grass-row svg { width: 100%; height: 100%; }

    /* Bouncy animals */
    .animal {
      position: fixed;
      bottom: 45px;
      font-size: 2.5rem;
      z-index: 2;
      animation: animalBounce 1.5s ease-in-out infinite;
      cursor: default;
      user-select: none;
    }
    .animal-1 { left: 5%; animation-delay: 0s; }
    .animal-2 { right: 5%; animation-delay: 0.5s; }

    @keyframes animalBounce {
      0%, 100% { transform: translateY(0) scaleX(1); }
      50% { transform: translateY(-12px) scaleX(1); }
    }
  </style>
</head>
<body>

  <!-- Clouds -->
  <div class="cloud cloud-1" style="left:-150px"></div>
  <div class="cloud cloud-2" style="left:-110px"></div>
  <div class="cloud cloud-3" style="left:-200px"></div>

  <!-- Floating stars/emojis background -->
  <div class="stars" id="stars"></div>

  <!-- Grass floor -->
  <div class="grass-row">

  </div>

  <!-- Animals -->
  <div class="animal animal-1">🐰</div>
  <div class="animal animal-2">🐻</div>

  <!-- Main -->
  <div class="container">
    <div class="title-wrap">
      <span class="title-emoji">🎮</span>
      <h1>Game World!</h1>
      <div class="subtitle">✨ Pick a game to play! ✨</div>
    </div>

    <div class="games-grid">

      <!-- Tic Tac Toe -->
      <a href="tictactoe.html" class="game-card card-ttt">
        <div class="card-icon">⭕❌</div>
        <div class="card-name">Tic Tac Toe!</div>
        <div class="card-desc">Two players take turns!</div>
        <div class="card-badge">🔗 Share & Play!</div>
      </a>

      <!-- Coming soon cards -->
      <div class="game-card card-soon">
        <div class="card-icon">🔢</div>
        <div class="card-name">Number Fun</div>
        <div class="card-desc">Count & learn!</div>
      </div>

      <div class="game-card card-soon">
        <div class="card-icon">🎨</div>
        <div class="card-name">Drawing Time</div>
        <div class="card-desc">Draw anything!</div>
      </div>

      <div class="game-card card-soon">
        <div class="card-icon">🔤</div>
        <div class="card-name">ABC Phonics</div>
        <div class="card-desc">Learn letters!</div>
      </div>

    </div>
  </div>

  <script>
    // Sprinkle floating emoji stars
    const emojis = ['⭐','🌟','✨','💫','🌈','🎈','🎀','🍭','🌸','🦋','🌙','☀️'];
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 18; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = Math.random() * 95 + 'vw';
      s.style.top = Math.random() * 80 + 'vh';
      s.style.animationDelay = (Math.random() * 3) + 's';
      s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      s.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
